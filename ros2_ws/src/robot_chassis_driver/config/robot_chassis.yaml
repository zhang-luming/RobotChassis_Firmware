# ==============================================================================
# RobotChassis 底盘驱动配置文件
# ==============================================================================

/**:
  ros__parameters:

    # ==========================================================================
    # 一、硬件配置
    # ==========================================================================

    # 串口设备
    serial_port: "/dev/ttyUSB0"

    # 串口波特率（需要与MCU固件一致）
    serial_baudrate: 921600

    # ==========================================================================
    # 二、时间同步配置
    # ==========================================================================

    # PTP同步间隔（毫秒）
    ptp_interval_ms: 200.0

    # ==========================================================================
    # 三、坐标系配置
    # ==========================================================================

    # 里程计坐标系
    odom_frame_id: "odom"

    # 机器人基础坐标系
    base_frame_id: "base_link"

    # IMU传感器坐标系
    imu_frame_id: "imu_link"

    # ==========================================================================
    # 四、里程计校准系数
    # ==========================================================================

    # X方向速度校准系数
    # 用途：修正轮速里程计的线速度测量误差
    # 建议：通过直行测试标定（实际距离/测量距离）
    odom_x_scale: 1.0

    # Yaw角速度校准系数
    # 用途：修正轮速里程计的角速度测量误差
    # 建议：通过原地旋转测试标定（实际角度/测量角度）
    odom_yaw_scale: 1.0

    # ==========================================================================
    # 五、机械参数（需要根据实际底盘测量调整）
    # ==========================================================================

    # 编码器每圈脉冲数
    # 计算公式：编码器线数 × 减速比 × 4（四倍频）
    # 例：13线 × 20减速比 × 4 = 1040
    encoder_ppr: 1040.0

    # 轮半径（米）
    # 测量方法：测量轮子中心到地面的垂直距离
    wheel_radius: 0.024

    # 轮距：左右轮中心距（米）
    # 测量方法：测量左轮中心到右轮中心的水平距离
    wheelbase: 0.148

    # ==========================================================================
    # 六、IMU数据配置
    # ==========================================================================

    # IMU数据单位转换（由固件确定，通常不需要修改）
    # 欧拉角：0.01度 → 弧度
    # 陀螺仪：0.01弧度/s → 弧度/s
    # 加速度：0.01g → m/s²
